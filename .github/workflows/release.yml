name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test,api]"
      - name: Lint+Test
        run: |
          ruff check .
          ruff format --check .
          mypy src
          pytest -q
      - name: Build artifacts (placeholder)
        run: |
          echo "AppImage/Flatpak build will be wired in faz5-packaging."

